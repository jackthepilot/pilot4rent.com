<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f2740">
<title>737NG Training Checklist</title>

<style>
:root{
  color-scheme:light dark;
  --bg:#edf3f7;
  --surface:#ffffff;
  --surface-2:#f6f9fb;
  --text:#12202f;
  --muted:#637483;
  --navy:#0f2740;
  --navy-2:#194b70;
  --blue:#1f5f8b;
  --line:#d7e0e7;
  --green:#1f7a45;
  --green-soft:#e3f5ea;
  --yellow:#fff7d6;
  --yellow-line:#e4bd47;
  --yellow-text:#56430c;
  --red:#b02c2c;
  --shadow:0 8px 24px rgba(15,39,64,.12);
}

@media (prefers-color-scheme:dark){
  :root{
    --bg:#0b151f;
    --surface:#132330;
    --surface-2:#182b39;
    --text:#eef6fb;
    --muted:#b2c1cc;
    --navy:#081720;
    --navy-2:#153e5b;
    --blue:#72bdec;
    --line:#2b4354;
    --green:#7bd79f;
    --green-soft:#153a29;
    --yellow:#3a3217;
    --yellow-line:#a8862d;
    --yellow-text:#ffe89a;
    --red:#ff9292;
    --shadow:0 10px 28px rgba(0,0,0,.35);
  }
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}
button,input{font:inherit}
button{cursor:pointer}

.app{
  max-width:900px;
  min-height:100vh;
  margin:0 auto;
  padding-bottom:28px;
}

.sticky-shell{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  box-shadow:0 5px 18px rgba(0,0,0,.22);
}

.topbar{
  color:#fff;
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  padding:calc(10px + env(safe-area-inset-top)) 15px 10px;
}

.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand{
  min-width:0;
  font-size:19px;
  font-weight:950;
  letter-spacing:.02em;
}

.top-progress{
  flex:0 0 auto;
  min-width:58px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  text-align:center;
  font-size:13px;
  font-weight:950;
}

.status-card{
  margin:0;
  padding:9px 12px 11px;
  border-bottom:1px solid var(--line);
  background:var(--surface);
}

.progress{
  height:9px;
  overflow:hidden;
  border-radius:999px;
  background:var(--line);
}

.progress-bar{
  width:0;
  height:100%;
  background:var(--green);
  transition:width .2s ease;
}

.progress-text{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:6px;
  font-size:12px;
  font-weight:900;
}

.actions{
  width:100%;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-top:9px;
}

.btn{
  width:100%;
  min-width:0;
  border:1px solid var(--line);
  border-radius:11px;
  padding:10px 6px;
  color:var(--text);
  background:var(--surface-2);
  font-size:13px;
  font-weight:900;
}

.btn.primary{
  color:#fff;
  border-color:var(--blue);
  background:var(--blue);
}

.btn.danger{
  color:var(--red);
  border-color:var(--red);
  background:transparent;
}

.search-wrap{
  display:none;
  padding:9px 12px 0;
  background:var(--bg);
}

.search-wrap.visible{
  display:block;
}

.search-input{
  width:100%;
  border:1px solid var(--line);
  border-radius:12px;
  padding:11px 13px;
  color:var(--text);
  background:var(--surface);
  outline:none;
  box-shadow:var(--shadow);
}

.search-input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--blue) 18%,transparent);
}

main{padding:12px}

.section{
  margin-bottom:12px;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface);
  box-shadow:var(--shadow);
}

.section-head{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:10px;
  padding:15px;
  border-bottom:1px solid var(--line);
  color:var(--text);
  background:var(--surface);
  font-weight:950;
  text-align:left;
}

button.section-head{
  width:100%;
  grid-template-columns:1fr auto auto;
  border:0;
  border-bottom:1px solid var(--line);
  border-radius:0;
  font:inherit;
  cursor:pointer;
}

button.section-head:hover{
  background:var(--surface-2);
}

.section-count{
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
}

.section-chevron{
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  border-radius:999px;
  color:var(--text);
  background:var(--surface-2);
  font-size:18px;
  line-height:1;
  transition:transform .18s ease;
}

.section.collapsed .section-body{
  display:none;
}

.section.collapsed .section-chevron{
  transform:rotate(-90deg);
}

.item{
  min-height:66px;
  display:grid;
  grid-template-columns:42px 1fr;
  gap:10px;
  align-items:start;
  padding:13px 14px;
  border-top:1px solid var(--line);
  background:var(--surface);
  cursor:pointer;
  transition:background-color .18s ease,box-shadow .18s ease,transform .08s ease;
  -webkit-tap-highlight-color:transparent;
}

.section-body > .item:first-child{
  border-top:0;
}

.item:active{transform:scale(.995)}

.item.done{
  background:var(--green-soft);
  box-shadow:inset 5px 0 0 var(--green);
}

.check{
  width:30px;
  height:30px;
  display:grid;
  place-content:center;
  margin:2px 0 0;
  appearance:none;
  -webkit-appearance:none;
  border:2px solid #8293a2;
  border-radius:9px;
  background:var(--surface);
}

.check::before{
  content:"";
  width:15px;
  height:8px;
  margin-top:-2px;
  border-left:3px solid #fff;
  border-bottom:3px solid #fff;
  transform:rotate(-45deg) scale(0);
  transition:transform .12s ease;
}

.check:checked{
  border-color:var(--green);
  background:var(--green);
}

.check:checked::before{
  transform:rotate(-45deg) scale(1);
}

.item-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

.item-name{
  font-size:15px;
  font-weight:950;
  line-height:1.3;
}

.role{
  flex:0 0 auto;
  padding:3px 7px;
  border:1px solid var(--line);
  border-radius:999px;
  color:var(--muted);
  background:var(--surface-2);
  font-size:10px;
  font-weight:950;
}

.item-action{
  margin-top:4px;
  color:var(--blue);
  font-weight:850;
  line-height:1.35;
}

.item.done .item-name,
.item.done .item-action,
.item.done .role{
  color:var(--green);
}

.entry-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:7px;
  margin-top:9px;
}

@media (min-width:560px){
  .entry-grid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}

.entry-grid input{
  width:100%;
  min-width:0;
  border:1px solid var(--line);
  border-radius:9px;
  padding:9px 10px;
  color:var(--text);
  background:var(--surface-2);
  font-size:13px;
  outline:none;
}

.note{
  margin:10px 12px;
  padding:11px 12px;
  border:1px solid var(--yellow-line);
  border-left:5px solid var(--yellow-line);
  border-radius:12px;
  color:var(--yellow-text);
  background:var(--yellow);
}

.note-label{
  margin-bottom:5px;
  font-size:11px;
  font-weight:950;
  letter-spacing:.06em;
}

.note-line{
  margin:3px 0;
  font-size:13px;
  font-weight:750;
  line-height:1.35;
}

.empty{
  padding:28px 18px;
  color:var(--muted);
  text-align:center;
  font-weight:800;
}

.footer-note{
  padding:4px 16px 20px;
  color:var(--muted);
  font-size:11px;
  text-align:center;
}
</style>
</head>

<body>
<div class="app">
  <div class="sticky-shell">
    <header class="topbar">
      <div class="topline">
        <div class="brand" id="brand">737NG CHECKLIST</div>
        <div class="top-progress" id="topProgress">0%</div>
      </div>
    </header>

    <section class="status-card">
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="progress-text">
        <span id="progressLabel">0 complete</span>
        <span id="progressPercent">0%</span>
      </div>

      <div class="actions" id="actions"></div>
    </section>
  </div>

  <div class="search-wrap" id="searchWrap">
    <input class="search-input" id="searchInput" type="search" autocomplete="off">
  </div>

  <main>
    <div id="screenRoot"></div>
  </main>

  <div class="footer-note">
    Training aid only. Use the applicable approved checklist, FCOM and QRH.<br>C = Captain · FO = First Officer · PF = Pilot Flying · PM = Pilot Monitoring
  </div>
</div>

em","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"REJECTED TAKEOFF","tags":"rto rejected takeoff runway stop","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"CABIN ALTITUDE WARNING / RAPID DECOMPRESSION","tags":"cabin altitude decompression oxygen pressurization","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"SMOKE, FIRE OR FUMES","tags":"smoke fire fumes electrical odor","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"RUNAWAY STABILIZER","tags":"stabilizer trim runaway","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"UNRELIABLE AIRSPEED","tags":"airspeed disagree pitot unreliable","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"WINDSHEAR ESCAPE","tags":"windshear warning escape","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"GPWS ESCAPE","tags":"gpws terrain pull up escape","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"EMERGENCY EVACUATION","tags":"evacuation fire ground passengers","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]},{"title":"LOSS OF ALL GENERATORS","tags":"electrical generators power loss","entries":[{"type":"note","label":"QRH REQUIRED","lines":["Use the applicable approved QRH and memory items.","Operational emergency steps are not stored in this version."]},{"type":"item","name":"CONDITION AND INDICATIONS","action":"REVIEWED"},{"type":"item","name":"MEMORY ITEMS","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"REFERENCE CHECKLIST","action":"REVIEWED FROM ASSIGNED QRH"},{"type":"item","name":"CREW ROLES AND COMMUNICATION","action":"REVIEWED"},{"type":"item","name":"DIVERSION / LANDING CONSIDERATIONS","action":"REVIEWED"}]}]}};
const STORAGE_KEY = "737ngTrainingChecklistV4";

let currentView = "checklist";
let searchQuery = "";
let state = {
  checks: {
    checklist: {},
    procedures: {},
    emergencies: {}
  },
  entries: {
    checklist: {},
    procedures: {},
    emergencies: {}
  },
  openSections: {
    procedures: {},
    emergencies: {}
  }
};

try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  state.checks = Object.assign(state.checks, saved.checks || {});
  state.entries = Object.assign(state.entries, saved.entries || {});
  state.openSections = Object.assign(
    state.openSections,
    saved.openSections || {}
  );
  state.openSections.procedures =
    state.openSections.procedures || {};
  state.openSections.emergencies =
    state.openSections.emergencies || {};
} catch (error) {
  console.warn("Could not restore saved progress.", error);
}

const $ = selector => document.querySelector(selector);
const $$ = selector => [...document.querySelectorAll(selector)];

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, character => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  })[character]);
}

function itemKey(sectionIndex, entryIndex) {
  return `${sectionIndex}:${entryIndex}`;
}

function viewItems(viewName) {
  const items = [];
  APP_DATA[viewName].sections.forEach((section, sectionIndex) => {
    section.entries.forEach((entry, entryIndex) => {
      if (entry.type === "item") {
        items.push({
          key: itemKey(sectionIndex, entryIndex),
          entry
        });
      }
    });
  });
  return items;
}

function progressFor(viewName) {
  const items = viewItems(viewName);
  const complete = items.filter(item => {
    return Boolean(state.checks[viewName][item.key]);
  }).length;

  return {
    total: items.length,
    complete,
    percent: items.length
      ? Math.round((complete / items.length) * 100)
      : 0
  };
}

function updateProgress() {
  const progress = progressFor(currentView);
  $("#progressBar").style.width = `${progress.percent}%`;
  $("#progressLabel").textContent =
    `${progress.complete} of ${progress.total} complete`;
  $("#progressPercent").textContent = `${progress.percent}%`;
  $("#topProgress").textContent = `${progress.percent}%`;
}

function renderActions() {
  const otherViews = ["checklist", "procedures", "emergencies"]
    .filter(view => view !== currentView);

  const label = {
    checklist: "Checklist",
    procedures: "Procedures",
    emergencies: "Emergencies"
  };

  $("#actions").innerHTML = `
    <button class="btn primary" type="button" data-view="${otherViews[0]}">
      ${label[otherViews[0]]}
    </button>
    <button class="btn primary" type="button" data-view="${otherViews[1]}">
      ${label[otherViews[1]]}
    </button>
    <button class="btn danger" id="resetCurrent" type="button">
      Reset
    </button>
  `;

  $$("[data-view]").forEach(button => {
    button.addEventListener("click", () => {
      currentView = button.dataset.view;
      searchQuery = "";
      window.scrollTo({ top: 0, behavior: "instant" });
      render();
    });
  });

  $("#resetCurrent").addEventListener("click", resetCurrentView);
}

function searchableText(section) {
  const entryText = section.entries.map(entry => {
    if (entry.type === "note") {
      return `${entry.label || ""} ${(entry.lines || []).join(" ")}`;
    }
    return `${entry.name || ""} ${entry.action || ""} ${entry.role || ""}`;
  }).join(" ");

  return `${section.title || ""} ${section.tags || ""} ${entryText}`
    .toLowerCase();
}

function filteredSections() {
  const sections = APP_DATA[currentView].sections;

  if (!APP_DATA[currentView].search || !searchQuery.trim()) {
    return sections.map((section, index) => ({
      section,
      originalIndex: index
    }));
  }

  const query = searchQuery.trim().toLowerCase();

  return sections
    .map((section, index) => ({
      section,
      originalIndex: index
    }))
    .filter(item => searchableText(item.section).includes(query));
}

function renderEntry(entry, sectionIndex, entryIndex) {
  if (entry.type === "note") {
    return `
      <aside class="note">
        <div class="note-label">${escapeHtml(entry.label || "NOTE")}</div>
        ${(entry.lines || []).map(line => `
          <div class="note-line">${escapeHtml(line)}</div>
        `).join("")}
      </aside>
    `;
  }

  const key = itemKey(sectionIndex, entryIndex);
  const checked = Boolean(state.checks[currentView][key]);

  const fields = (entry.fields || []).map((field, fieldIndex) => {
    const entryKey = `${key}:field:${fieldIndex}`;
    return `
      <input
        type="text"
        data-entry="${escapeHtml(entryKey)}"
        value="${escapeHtml(state.entries[currentView][entryKey] || "")}"
        placeholder="${escapeHtml(field)}"
        aria-label="${escapeHtml(field)}"
      >
    `;
  }).join("");

  return `
    <div class="item ${checked ? "done" : ""}">
      <input
        class="check"
        type="checkbox"
        data-check="${escapeHtml(key)}"
        ${checked ? "checked" : ""}
        aria-label="Complete ${escapeHtml(entry.name)}"
      >

      <div>
        <div class="item-top">
          <div class="item-name">${escapeHtml(entry.name)}</div>
          ${
            entry.role
              ? `<span class="role">${escapeHtml(entry.role)}</span>`
              : ""
          }
        </div>

        <div class="item-action">${escapeHtml(entry.action)}</div>

        ${
          fields
            ? `<div class="entry-grid">${fields}</div>`
            : ""
        }
      </div>
    </div>
  `;
}

function renderScreen() {
  const visible = filteredSections();

  if (!visible.length) {
    $("#screenRoot").innerHTML = `
      <div class="empty">No matching items found.</div>
    `;
    return;
  }

  const menusAreCollapsible = currentView !== "checklist";
  const searchIsActive =
    Boolean(APP_DATA[currentView].search && searchQuery.trim());

  $("#screenRoot").innerHTML = visible.map(({section, originalIndex}) => {
    const items = section.entries
      .map((entry, entryIndex) => ({entry, entryIndex}))
      .filter(item => item.entry.type === "item");

    const complete = items.filter(item => {
      return Boolean(
        state.checks[currentView][itemKey(originalIndex, item.entryIndex)]
      );
    }).length;

    const storedOpen = menusAreCollapsible
      ? Boolean(state.openSections[currentView][originalIndex])
      : true;

    const isOpen = !menusAreCollapsible || searchIsActive || storedOpen;
    const collapsedClass =
      menusAreCollapsible && !isOpen ? " collapsed" : "";

    const heading = menusAreCollapsible
      ? `
        <button
          class="section-head"
          type="button"
          data-toggle-section="${originalIndex}"
          aria-expanded="${isOpen ? "true" : "false"}"
        >
          <span>${escapeHtml(section.title)}</span>
          <span class="section-count">${complete}/${items.length}</span>
          <span class="section-chevron" aria-hidden="true">⌄</span>
        </button>
      `
      : `
        <div class="section-head">
          <span>${escapeHtml(section.title)}</span>
          <span class="section-count">${complete}/${items.length}</span>
        </div>
      `;

    return `
      <section class="section${collapsedClass}">
        ${heading}

        <div class="section-body">
          ${section.entries.map((entry, entryIndex) => {
            return renderEntry(entry, originalIndex, entryIndex);
          }).join("")}
        </div>
      </section>
    `;
  }).join("");

  $$("[data-toggle-section]").forEach(button => {
    button.addEventListener("click", () => {
      const sectionIndex = button.dataset.toggleSection;
      const sectionElement = button.closest(".section");
      const shouldOpen = sectionElement.classList.contains("collapsed");

      sectionElement.classList.toggle("collapsed", !shouldOpen);
      button.setAttribute(
        "aria-expanded",
        shouldOpen ? "true" : "false"
      );

      state.openSections[currentView][sectionIndex] = shouldOpen;
      saveState();
    });
  });

  $$("[data-check]").forEach(checkbox => {
    checkbox.addEventListener("change", () => {
      state.checks[currentView][checkbox.dataset.check] = checkbox.checked;
      saveState();
      render();
    });
  });

  $$(".item").forEach(row => {
    row.addEventListener("click", event => {
      if (event.target.closest("input,button,select,textarea,a")) {
        return;
      }

      const checkbox = row.querySelector("[data-check]");
      if (!checkbox) {
        return;
      }

      checkbox.checked = !checkbox.checked;
      state.checks[currentView][checkbox.dataset.check] = checkbox.checked;
      saveState();
      render();
    });
  });

  $$("[data-entry]").forEach(input => {
    input.addEventListener("input", () => {
      state.entries[currentView][input.dataset.entry] = input.value;
      saveState();
    });
  });
}

function resetCurrentView() {
  const viewLabel = {
    checklist: "checklist",
    procedures: "procedures",
    emergencies: "emergencies"
  }[currentView];

  if (!window.confirm(`Reset all ${viewLabel} progress and entered values?`)) {
    return;
  }

  state.checks[currentView] = {};
  state.entries[currentView] = {};
  saveState();
  render();
}

function render() {
  const view = APP_DATA[currentView];

  $("#brand").textContent = view.title;
  renderActions();

  const searchWrap = $("#searchWrap");
  const searchInput = $("#searchInput");

  if (view.search) {
    searchWrap.classList.add("visible");
    searchInput.placeholder = view.searchPlaceholder || "Search";
    searchInput.value = searchQuery;
  } else {
    searchWrap.classList.remove("visible");
    searchInput.value = "";
  }

  renderScreen();
  updateProgress();
}

$("#searchInput").addEventListener("input", event => {
  searchQuery = event.target.value;
  renderScreen();
});

render();
</script>
