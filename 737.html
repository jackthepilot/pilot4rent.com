<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f2740">
<title>737NG Checklist</title>

<style>
:root {
  color-scheme: light dark;
  --bg:#edf3f7;
  --surface:#ffffff;
  --surface-2:#f6f9fb;
  --text:#12202f;
  --muted:#637483;
  --navy:#0f2740;
  --navy-2:#194b70;
  --blue:#1f5f8b;
  --line:#d7e0e7;
  --green:#1f7a45;
  --green-soft:#e3f5ea;
  --red:#b02c2c;
  --shadow:0 8px 24px rgba(15,39,64,.12);
}

@media (prefers-color-scheme:dark) {
  :root {
    --bg:#0b151f;
    --surface:#132330;
    --surface-2:#182b39;
    --text:#eef6fb;
    --muted:#b2c1cc;
    --navy:#081720;
    --navy-2:#153e5b;
    --blue:#72bdec;
    --line:#2b4354;
    --green:#7bd79f;
    --green-soft:#153a29;
    --red:#ff9292;
    --shadow:0 10px 28px rgba(0,0,0,.35);
  }
}

* { box-sizing:border-box; }

html { scroll-behavior:smooth; }

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}

button,input { font:inherit; }
button { cursor:pointer; }

.app {
  max-width:900px;
  min-height:100vh;
  margin:0 auto;
  padding-bottom:30px;
}

.sticky-shell {
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  box-shadow:0 5px 18px rgba(0,0,0,.22);
}

.topbar {
  color:#fff;
  background:linear-gradient(135deg,var(--navy),var(--navy-2));
  padding:calc(10px + env(safe-area-inset-top)) 15px 10px;
}

.topline {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand {
  font-size:19px;
  font-weight:950;
  letter-spacing:.02em;
}

.top-progress {
  flex:0 0 auto;
  min-width:58px;
  text-align:center;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  font-size:13px;
  font-weight:950;
}

.status-card {
  margin:0;
  padding:9px 12px 11px;
  border-bottom:1px solid var(--line);
  background:var(--surface);
}

.progress {
  height:9px;
  overflow:hidden;
  border-radius:999px;
  background:var(--line);
}

.progress-bar {
  width:0;
  height:100%;
  background:var(--green);
  transition:width .2s ease;
}

.progress-text {
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:6px;
  font-size:12px;
  font-weight:900;
}

.actions {
  width:100%;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-top:9px;
}

.btn {
  width:100%;
  min-width:0;
  border:1px solid var(--line);
  border-radius:11px;
  padding:10px 6px;
  color:var(--text);
  background:var(--surface-2);
  font-size:13px;
  font-weight:900;
}

.btn.danger {
  color:var(--red);
  background:transparent;
  border-color:var(--red);
}

main { padding:12px; }

.section {
  margin-bottom:12px;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface);
  box-shadow:var(--shadow);
}

.section-head {
  width:100%;
  display:grid;
  grid-template-columns:1fr auto auto;
  align-items:center;
  gap:10px;
  border:0;
  padding:15px;
  color:var(--text);
  background:var(--surface);
  text-align:left;
  font-weight:950;
}

.section-count {
  color:var(--muted);
  font-size:12px;
}

.chevron {
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:var(--surface-2);
  transition:transform .2s ease;
}

.section.collapsed .section-body { display:none; }
.section.collapsed .chevron { transform:rotate(-90deg); }

.item {
  min-height:66px;
  display:grid;
  grid-template-columns:42px 1fr;
  gap:10px;
  align-items:start;
  padding:13px 14px;
  border-top:1px solid var(--line);
  background:var(--surface);
  cursor:pointer;
  transition:background-color .18s ease,box-shadow .18s ease,transform .08s ease;
  -webkit-tap-highlight-color:transparent;
}

.item:active { transform:scale(.995); }

.item.done {
  background:var(--green-soft);
  box-shadow:inset 5px 0 0 var(--green);
}

.check {
  width:30px;
  height:30px;
  display:grid;
  place-content:center;
  margin:2px 0 0;
  appearance:none;
  -webkit-appearance:none;
  border:2px solid #8293a2;
  border-radius:9px;
  background:var(--surface);
}

.check::before {
  content:"";
  width:15px;
  height:8px;
  margin-top:-2px;
  border-left:3px solid #fff;
  border-bottom:3px solid #fff;
  transform:rotate(-45deg) scale(0);
  transition:transform .12s ease;
}

.check:checked {
  border-color:var(--green);
  background:var(--green);
}

.check:checked::before {
  transform:rotate(-45deg) scale(1);
}

.item-top {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

.item-name {
  font-size:15px;
  font-weight:950;
  line-height:1.3;
}

.role {
  flex:0 0 auto;
  padding:3px 7px;
  border:1px solid var(--line);
  border-radius:999px;
  color:var(--muted);
  background:var(--surface-2);
  font-size:10px;
  font-weight:950;
}

.item-action {
  margin-top:4px;
  color:var(--blue);
  font-weight:850;
  line-height:1.35;
}

.item.done .item-name,
.item.done .item-action,
.item.done .role {
  color:var(--green);
}

.entry-grid {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:7px;
  margin-top:9px;
}

@media (min-width:560px) {
  .entry-grid {
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}

.entry-grid input {
  width:100%;
  min-width:0;
  border:1px solid var(--line);
  border-radius:9px;
  padding:9px 10px;
  color:var(--text);
  background:var(--surface-2);
  font-size:13px;
  outline:none;
}

.footer-note {
  padding:4px 16px 20px;
  color:var(--muted);
  font-size:11px;
  text-align:center;
}
</style>
</head>

<body>
<div class="app">
  <div class="sticky-shell">
    <header class="topbar">
      <div class="topline">
        <div class="brand">737NG CHECKLIST</div>
        <div class="top-progress" id="topProgress">0%</div>
      </div>
    </header>

    <section class="status-card">
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="progress-text">
        <span id="progressLabel">0 complete</span>
        <span id="progressPercent">0%</span>
      </div>

      <div class="actions">
        <button class="btn" id="expandAll" type="button">Expand</button>
        <button class="btn" id="collapseAll" type="button">Collapse</button>
        <button class="btn danger" id="resetChecklist" type="button">Reset</button>
      </div>
    </section>
  </div>

  <main>
    <div id="checklistRoot"></div>
  </main>

  <div class="footer-note">
    Training and reference use only. Not approved for aircraft operation.
  </div>
</div>

FE SPEED, CLEARANCE VERIFIED","role":"PF/PM"}]},{"title":"18. AFTER LANDING","items":[{"name":"SPEEDBRAKE","action":"DOWN","role":"PM"},{"name":"FLAPS","action":"UP","role":"PM"},{"name":"AUTOBRAKE","action":"OFF","role":"PM"},{"name":"ENGINE START SWITCHES","action":"OFF","role":"PM"},{"name":"WEATHER RADAR","action":"OFF","role":"PF/PM"},{"name":"TRANSPONDER","action":"AS REQUIRED FOR TAXI","role":"PM"},{"name":"LANDING LIGHTS","action":"OFF","role":"PM"},{"name":"STROBE","action":"OFF","role":"PM"},{"name":"TAXI LIGHT","action":"ON","role":"PM"},{"name":"APU","action":"START WHEN REQUIRED","role":"PM"},{"name":"TAXI CLEARANCE AND GATE","action":"CONFIRMED","role":"PF/PM"}]},{"title":"19. PARKING AND SHUTDOWN","items":[{"name":"PARKING POSITION","action":"CONFIRMED","role":"PF/PM"},{"name":"PARKING BRAKE","action":"SET OR CHOCKS CONFIRMED","role":"C"},{"name":"ELECTRICAL POWER","action":"APU OR GROUND POWER ON BUS","role":"FO"},{"name":"ENGINE START LEVERS","action":"CUTOFF","role":"C"},{"name":"ANTI-COLLISION LIGHT","action":"OFF AFTER ENGINES STOP","role":"FO"},{"name":"FUEL PUMPS","action":"OFF","role":"FO"},{"name":"ELECTRIC HYDRAULIC PUMPS","action":"OFF","role":"FO"},{"name":"PROBE HEAT","action":"OFF","role":"FO"},{"name":"ENGINE AND WING ANTI-ICE","action":"OFF","role":"FO"},{"name":"FLAPS","action":"UP","role":"FO"},{"name":"SPEEDBRAKE","action":"DOWN","role":"C"},{"name":"TRANSPONDER","action":"STANDBY","role":"FO"},{"name":"WEATHER RADAR","action":"OFF","role":"C/FO"},{"name":"PASSENGER SIGNS","action":"OFF AS APPROPRIATE","role":"FO"},{"name":"DOOR WARNING LIGHTS","action":"MONITOR","role":"C/FO"},{"name":"FUEL PUMPS","action":"AUTO / OFF","role":"FO"},{"name":"PROBE HEAT","action":"AUTO / OFF","role":"FO"},{"name":"HYDRAULIC PANEL","action":"SET","role":"FO"},{"name":"PARKING BRAKE","action":"SET AS REQUIRED","role":"C"}]},{"title":"20. SECURE AIRCRAFT","items":[{"name":"IRS MODE SELECTORS","action":"OFF","role":"FO"},{"name":"EMERGENCY EXIT LIGHTS","action":"OFF","role":"FO"},{"name":"WINDOW HEAT","action":"OFF","role":"FO"},{"name":"PACK SWITCHES","action":"OFF","role":"FO"},{"name":"RECIRCULATION FANS","action":"OFF","role":"FO"},{"name":"APU BLEED","action":"OFF","role":"FO"},{"name":"EXTERIOR LIGHTS","action":"OFF","role":"FO"},{"name":"APU","action":"OFF AFTER COOLDOWN","role":"FO"},{"name":"GROUND POWER","action":"DISCONNECT IF REQUIRED","role":"FO"},{"name":"BATTERY","action":"OFF","role":"FO"},{"name":"FLIGHT DECK","action":"SECURE","role":"C/FO"},{"name":"APU SWITCH AND / OR GRD POWER SWITCH","action":"OFF"},{"name":"BATTERY SWITCH","action":"OFF"},{"name":"IRS SELECTORS","action":"OFF","role":"FO"},{"name":"PACKS","action":"OFF","role":"FO"}]}]}};
const STORAGE_KEY = "737ngSingleOrganizedChecklistV1";

let state = {
  checks: {},
  entries: {}
};

try {
  state = Object.assign(
    state,
    JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}")
  );
} catch (error) {
  console.warn("Could not restore checklist progress.", error);
}

state.checks = state.checks || {};
state.entries = state.entries || {};

const checklist = CHECKLISTS.unified;
const $ = selector => document.querySelector(selector);
const $$ = selector => [...document.querySelectorAll(selector)];

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, character => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  })[character]);
}

function itemKey(sectionIndex, itemIndex) {
  return `${sectionIndex}:${itemIndex}`;
}

function progress() {
  let total = 0;
  let complete = 0;

  checklist.sections.forEach((section, sectionIndex) => {
    section.items.forEach((item, itemIndex) => {
      total += 1;
      if (state.checks[itemKey(sectionIndex, itemIndex)]) {
        complete += 1;
      }
    });
  });

  return {
    total,
    complete,
    percent: total ? Math.round((complete / total) * 100) : 0
  };
}

function updateProgress() {
  const value = progress();
  $("#progressBar").style.width = `${value.percent}%`;
  $("#progressLabel").textContent =
    `${value.complete} of ${value.total} complete`;
  $("#progressPercent").textContent = `${value.percent}%`;
  $("#topProgress").textContent = `${value.percent}%`;
}

function renderChecklist() {
  $("#checklistRoot").innerHTML = checklist.sections
    .map((section, sectionIndex) => {
      const complete = section.items.filter((item, itemIndex) => {
        return state.checks[itemKey(sectionIndex, itemIndex)];
      }).length;

      const items = section.items.map((item, itemIndex) => {
        const key = itemKey(sectionIndex, itemIndex);
        const checked = Boolean(state.checks[key]);

        const fields = (item.fields || []).map((field, fieldIndex) => {
          const entryKey = `${key}:field:${fieldIndex}`;
          return `
            <input
              type="text"
              data-entry="${escapeHtml(entryKey)}"
              value="${escapeHtml(state.entries[entryKey] || "")}"
              placeholder="${escapeHtml(field)}"
              aria-label="${escapeHtml(field)}"
            >
          `;
        }).join("");

        return `
          <div class="item ${checked ? "done" : ""}">
            <input
              class="check"
              type="checkbox"
              data-check="${escapeHtml(key)}"
              ${checked ? "checked" : ""}
              aria-label="Complete ${escapeHtml(item.name)}"
            >

            <div>
              <div class="item-top">
                <div class="item-name">${escapeHtml(item.name)}</div>
                ${
                  item.role
                    ? `<span class="role">${escapeHtml(item.role)}</span>`
                    : ""
                }
              </div>

              <div class="item-action">${escapeHtml(item.action)}</div>

              ${
                fields
                  ? `<div class="entry-grid">${fields}</div>`
                  : ""
              }
            </div>
          </div>
        `;
      }).join("");

      return `
        <section class="section">
          <button class="section-head" type="button">
            <span>${escapeHtml(section.title)}</span>
            <span class="section-count">${complete}/${section.items.length}</span>
            <span class="chevron">⌄</span>
          </button>

          <div class="section-body">${items}</div>
        </section>
      `;
    }).join("");

  $$(".section-head").forEach(button => {
    button.addEventListener("click", () => {
      button.closest(".section").classList.toggle("collapsed");
    });
  });

  $$("[data-check]").forEach(checkbox => {
    checkbox.addEventListener("change", () => {
      state.checks[checkbox.dataset.check] = checkbox.checked;
      saveState();
      renderChecklist();
    });
  });

  $$(".item").forEach(row => {
    row.addEventListener("click", event => {
      if (event.target.closest("input,button,select,textarea,a")) {
        return;
      }

      const checkbox = row.querySelector("[data-check]");
      if (!checkbox) {
        return;
      }

      checkbox.checked = !checkbox.checked;
      state.checks[checkbox.dataset.check] = checkbox.checked;
      saveState();
      renderChecklist();
    });
  });

  $$("[data-entry]").forEach(input => {
    input.addEventListener("input", () => {
      state.entries[input.dataset.entry] = input.value;
      saveState();
    });
  });

  updateProgress();
}

$("#expandAll").addEventListener("click", () => {
  $$("#checklistRoot .section").forEach(section => {
    section.classList.remove("collapsed");
  });
});

$("#collapseAll").addEventListener("click", () => {
  $$("#checklistRoot .section").forEach(section => {
    section.classList.add("collapsed");
  });
});

$("#resetChecklist").addEventListener("click", () => {
  if (!window.confirm("Reset all checklist progress and entered values?")) {
    return;
  }

  state = {
    checks: {},
    entries: {}
  };

  saveState();
  renderChecklist();
});

renderChecklist();
</script>
